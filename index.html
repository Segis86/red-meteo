<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Red Meteo</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
#map {
  height: 100vh;
}
.temp-marker div {
  padding: 4px;
  border-radius: 4px;
  color: white;
  font-weight: bold;
  text-align: center;
  width: 40px;
}
</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// Crear mapa centrado en tu zona
var map = L.map('map').setView([39.73, -0.82], 9);

// Capa de mapa
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
 attribution: '© OpenStreetMap'
}).addTo(map);

// Lista de estaciones con temperatura simulada
fetch("https://red-meteo.onrender.com/estaciones.json")
.then(function(response){
  return response.json();
})
.then(function(estaciones){

  estaciones.forEach(function(est){

    var temp = est.temp;

    var color;
    if(temp < 10) color = 'blue';
    else if(temp < 20) color = 'orange';
    else color = 'red';

    var tempIcon = L.divIcon({
      className: 'temp-marker',
      html: '<div style="background-color:'+color+';">'+ temp +'°C</div>'
    });

    var marker = L.marker([est.lat, est.lon], {icon: tempIcon}).addTo(map);

    marker.bindPopup(
      "<b>" + est.nombre + "</b><br>" +
      "<a href='" + est.link + "' target='_blank'>Ver datos en directo</a>"
    );

  });

});

// Crear marcadores con temperatura y color según temperatura
estaciones.forEach(function(est) {

  var temp = est.temp;

  // Elegir color según temperatura
  var color;
  if(temp < 10) color = 'blue';
  else if(temp < 20) color = 'orange';
  else color = 'red';

  // Icono personalizado con temperatura
  var tempIcon = L.divIcon({
    className: 'temp-marker',
    html: '<div style="background-color:'+color+';">'+ temp +'°C</div>'
  });

  var marker = L.marker([est.lat, est.lon], {icon: tempIcon}).addTo(map);

  marker.bindPopup(
    "<b>" + est.nombre + "</b><br>" +
    "<a href='" + est.link + "' target='_blank'>Ver datos en directo</a>"
  );

});

</script>

</body>
</html>
