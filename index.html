<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Red Meteo</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
#map {
height: 100vh;
}
</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([39.73, -0.82], 8);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
 attribution: '© OpenStreetMap'
}).addTo(map);

var marker = L.marker([39.73039598729157, -0.8261959606953505]).addTo(map);

marker.bindPopup(
"<b>Villar del Arzobispo - Iglesia</b><br>" +
"<a href='https://www.wunderground.com/dashboard/pws/IVILLA1255' target='_blank'>Ver datos en directo</a>"
);

</script>

</body>
</html>
