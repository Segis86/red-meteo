<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Red Meteo</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
#map {
  height: 100vh;
}
.temp-marker div {
  padding: 4px;
  border-radius: 4px;
  color: white;
  font-weight: bold;
  text-align: center;
  width: 40px;
}
</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>

// Crear mapa
var map = L.map('map').setView([39.73, -0.82], 9);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
 attribution: '© OpenStreetMap'
}).addTo(map);

var estaciones = []; // Se llenará desde tu servidor

// Función para dibujar marcadores
function dibujarMarcadores() {
  map.eachLayer(function(layer){
    if(layer instanceof L.Marker) map.removeLayer(layer);
  });

  estaciones.forEach(function(est) {
    var temp = est.temp;
    var color = temp < 10 ? 'blue' : temp < 20 ? 'orange' : 'red';

    var tempIcon = L.divIcon({
      className: 'temp-marker',
      html: '<div style="background-color:'+color+';">'+ temp +'°C</div>'
    });

    var marker = L.marker([est.lat, est.lon], {icon: tempIcon}).addTo(map);

    marker.bindPopup(
      "<b>" + est.nombre + "</b><br>" +
      "<a href='" + est.link + "' target='_blank'>Ver datos en directo</a>"
    );
  });
}

// Función para actualizar desde tu JSON real en Render
function actualizarDesdeServidor() {
  fetch('https://TU_SERVIDOR/estaciones.json') // reemplaza con tu URL de Render
    .then(response => response.json())
    .then(data => {
      estaciones = data;
      dibujarMarcadores();
    })
    .catch(err => {
      console.error("No se pudo cargar JSON, usando datos de prueba:", err);
      // Mantener al menos marcadores de prueba para no romper el mapa
      estaciones = [
        {nombre:"Villar del Arzobispo - Iglesia", lat:39.73, lon:-0.82, link:"#", temp:10},
        {nombre:"Benaguasil", lat:39.59, lon:-0.58, link:"#", temp:13}
      ];
      dibujarMarcadores();
    });
}

// Primera carga
actualizarDesdeServidor();

// Refrescar cada 5 minutos (300000 ms)
setInterval(actualizarDesdeServidor, 300000);

</script>

</body>
</html>
