<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Red Meteo Avanzada Viento</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>
#map { height: 100vh; }
.temp-marker div {
  padding: 4px;
  border-radius: 4px;
  color: white;
  font-weight: bold;
  text-align: center;
  min-width: 40px;
  position: relative;
}
.wind-arrow {
  position: absolute;
  top: -10px;
  left: 50%;
  transform-origin: center;
  font-size: 12px;
}
</style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>

// Crear mapa
var map = L.map('map').setView([39.73, -0.82], 9);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);

var estaciones = [];

// Gradiente de temperatura (0°C azul → 35°C rojo)
function colorTemp(temp){
  var r = Math.min(255, Math.max(0, Math.floor((temp/35)*255)));
  var b = 255 - r;
  return 'rgb('+r+',0,'+b+')';
}

// Dibujar marcadores con flechas de viento
function dibujarMarcadores(){
  map.eachLayer(function(layer){
    if(layer instanceof L.Marker) map.removeLayer(layer);
  });

  estaciones.forEach(function(est){
    var tempColor = colorTemp(est.temp);

    // Crear icono con temperatura y flecha de viento
    var html = '<div style="background-color:'+tempColor+';">'+est.temp+'°C'+
               '<div class="wind-arrow" style="transform: rotate('+est.wind_dir+'deg);">⬆</div></div>';

    var tempIcon = L.divIcon({ className: 'temp-marker', html: html });
    var marker = L.marker([est.lat, est.lon], {icon: tempIcon}).addTo(map);

    var popupContent = "<b>"+est.nombre+"</b><br>"+
                       "Temp: "+est.temp+"°C<br>"+
                       "Humedad: "+est.hum+"%<br>"+
                       "Viento: "+est.wind_speed+" km/h<br>"+
                       "<a href='"+est.link+"' target='_blank'>Ver datos en WU</a>";
    marker.bindPopup(popupContent);
  });
}

// Actualizar datos desde JSON real
function actualizarDesdeJSON(){
  fetch('https://TU_SERVIDOR/estaciones.json') // Reemplaza con tu URL real
    .then(r => r.json())
    .then(data => {
      estaciones = data;
      dibujarMarcadores();
    })
    .catch(err => console.error("Error cargando JSON:", err));
}

// Primera carga
actualizarDesdeJSON();

// Actualizar cada 5 min
setInterval(actualizarDesdeJSON, 5*60*1000);

</script>

</body>
</html>
