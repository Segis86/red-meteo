<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Red Meteo</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
#map {
height: 100vh;
}
</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// Crear mapa
var map = L.map('map').setView([39.73, -0.82], 9);

// Capa de mapa
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
 attribution: '© OpenStreetMap'
}).addTo(map);

// Lista de estaciones
var estaciones = [
{
nombre: "Villar del Arzobispo - Iglesia",
lat: 39.73,
lon: -0.82,
link: "https://www.wunderground.com/dashboard/pws/IVILLA1255"
},
{
nombre: "Benaguasil",
lat: 39.59,
lon: -0.58,
link: "https://www.wunderground.com/dashboard/pws/IBENAG2"
}

// Crear marcadores
estaciones.forEach(function(est) {

var marker = L.marker([est.lat, est.lon]).addTo(map);

marker.bindPopup(
"<b>" + est.nombre + "</b><br>" +
"<a href='" + est.link + "' target='_blank'>Ver datos en directo</a>"
);

});

</script>

</body>
</html>
